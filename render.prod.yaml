services:
  # FastAPI backend
  - type: web
    name: tiberius-api
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: APP_ENV=production uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: GMAIL_USER_EMAIL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"

  # Telegram bot (long-running background worker)
  - type: worker
    name: tiberius-telegram-bot
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: APP_ENV=production python telegram_bot.py
    envVars:
      - key: APP_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"

  # Email ingestor (runs on a schedule)
  - type: cron
    name: tiberius-email-ingestor
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: APP_ENV=production python email_ingestor.py
    schedule: "*/15 * * * *"
    envVars:
      - key: APP_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: GMAIL_USER_EMAIL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
